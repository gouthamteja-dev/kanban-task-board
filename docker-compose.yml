services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban_task_board
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban_task_board"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    container_name: kanban-api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kanban:kanban@postgres:5432/kanban_task_board?schema=public
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run db:deploy && npm run db:seed && npm run dev:server"

volumes:
  postgres-data:
